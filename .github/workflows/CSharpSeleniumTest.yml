name: CSharpSeleniumTest

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      # ✅ Run tests (generates allure-results if Allure.NUnit is installed)
      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      # ✅ Install Java (needed for Allure CLI)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Install Allure (stable version)
      - name: Install Allure
        run: |
          ALLURE_VERSION=2.24.0
          wget https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz
          sudo mv allure-$ALLURE_VERSION /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ✅ Generate Allure report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # ✅ Upload report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
